<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNova Solutions | Advanced Tech</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#a855f7',
                        darkBg: '#0f172a',
                        cardDark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (CDNs) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (CDN) for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Phosphor Icons for elegant UI icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* dark mode default */
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden selection:bg-primary selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'glass py-4 shadow-lg' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                        <div className="text-2xl font-extrabold tracking-tighter text-white flex items-center gap-2">
                            <i className="ph-fill ph-planet text-primary text-3xl"></i>
                            TechNova<span className="text-primary">.</span>
                        </div>
                        
                        {/* Desktop Menu */}
                        <div className="hidden md:flex space-x-8 items-center text-sm font-medium text-slate-300">
                            <a href="#about" className="hover:text-white transition-colors duration-200">About</a>
                            <a href="#services" className="hover:text-white transition-colors duration-200">Services</a>
                            <a href="#works" className="hover:text-white transition-colors duration-200">Portfolio</a>
                            <a href="#contact" className="hover:text-white transition-colors duration-200">Contact</a>
                            <a href="#contact" className="px-5 py-2.5 rounded-full bg-primary/10 text-primary border border-primary/20 hover:bg-primary hover:text-white transition-all duration-300 shadow-[0_0_15px_rgba(99,102,241,0.2)] hover:shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                                Get Started
                            </a>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-2xl text-slate-300" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                            <i className={`ph ${mobileMenuOpen ? 'ph-x' : 'ph-list'}`}></i>
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {mobileMenuOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full glass flex flex-col items-center py-6 space-y-4 shadow-xl border-t border-white/10">
                            <a href="#about" onClick={() => setMobileMenuOpen(false)} className="text-slate-300 hover:text-white">About</a>
                            <a href="#services" onClick={() => setMobileMenuOpen(false)} className="text-slate-300 hover:text-white">Services</a>
                            <a href="#works" onClick={() => setMobileMenuOpen(false)} className="text-slate-300 hover:text-white">Portfolio</a>
                            <a href="#contact" onClick={() => setMobileMenuOpen(false)} className="text-slate-300 hover:text-white">Contact</a>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
                    {/* Background glow effects */}
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/20 rounded-full blur-[120px] pointer-events-none"></div>
                    
                    <div className="relative z-10 text-center px-6 max-w-4xl mx-auto animate-fade-in-up">
                        <div className="inline-block mb-4 px-4 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur-md text-sm font-medium text-primary">
                            ✨ Next-Generation Digital Solutions
                        </div>
                        <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 leading-tight">
                            Innovating the <br /> <span className="gradient-text">Future of Web</span>
                        </h1>
                        <p className="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-10 leading-relaxed">
                            We build modern performant applications that elevate your brand and provide unmatched user experiences.
                        </p>
                        <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                            <button onClick={() => alert('Welcome to TechNova Solutions 🚀')} className="px-8 py-4 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-semibold text-lg hover:scale-105 transition-transform duration-300 shadow-[0_0_30px_rgba(99,102,241,0.4)]">
                                View Our Work
                            </button>
                            <a href="#contact" className="px-8 py-4 rounded-full bg-cardDark border border-white/10 text-white font-semibold text-lg hover:bg-white/5 transition-colors duration-300">
                                Contact Us
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        const About = () => {
            return (
                <section id="about" className="py-24 relative z-10">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="flex flex-col md:flex-row items-center gap-16">
                            <div className="w-full md:w-1/2 relative">
                                <div className="absolute inset-0 bg-gradient-to-r from-primary to-secondary rounded-[3rem] blur-2xl opacity-30 animate-pulse"></div>
                                <div className="relative glass p-2 rounded-[3rem] border border-white/10">
                                    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=800&auto=format&fit=crop" alt="About TechNova" className="rounded-[2.5rem] w-full h-auto object-cover" />
                                    <div className="absolute -bottom-6 -right-6 glass p-6 rounded-3xl border border-white/10 shadow-2xl">
                                        <div className="text-4xl font-extrabold text-primary mb-1">10+</div>
                                        <div className="text-sm text-slate-300 font-medium">Years of Innovation</div>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full md:w-1/2">
                                <div className="inline-block mb-4 px-4 py-1.5 rounded-full border border-primary/30 bg-primary/10 text-sm font-medium text-primary">
                                    Who We Are
                                </div>
                                <h2 className="text-3xl md:text-5xl font-bold mb-6 leading-tight">We Build <span className="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Digital Excellence</span></h2>
                                <p className="text-lg text-slate-400 mb-6 leading-relaxed">
                                    At TechNova, we believe in the power of technology to transform businesses. Our team of expert developers, designers, and strategists work together to create custom digital solutions that drive real results.
                                </p>
                                <p className="text-lg text-slate-400 mb-10 leading-relaxed">
                                    From cutting-edge web applications to intuitive mobile experiences, we leverage the latest technologies to ensure our clients stay ahead of the curve in an ever-evolving digital landscape.
                                </p>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center text-primary text-2xl">
                                            <i className="ph-fill ph-rocket"></i>
                                        </div>
                                        <div>
                                            <div className="font-bold text-white text-lg">Fast Delivery</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-2xl bg-secondary/20 flex items-center justify-center text-secondary text-2xl">
                                            <i className="ph-fill ph-shield-check"></i>
                                        </div>
                                        <div>
                                            <div className="font-bold text-white text-lg">High Security</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Services = () => {
            const services = [
                { icon: "ph-code-block", title: "Web Development", desc: "Modern, responsive, and blazing fast websites tailored for you." },
                { icon: "ph-paint-brush-broad", title: "UI/UX Design", desc: "Clean, intuitive, and user-friendly interfaces that retain users." },
                { icon: "ph-device-mobile", title: "Mobile Apps", desc: "Native iOS and Android mobile app development." }
            ];

            return (
                <section id="services" className="py-24 relative z-10">
                    <div className="max-w-7xl mx-auto px-6 flex flex-col items-center">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">Our <span className="text-primary">Services</span></h2>
                            <p className="text-slate-400 max-w-xl mx-auto cursor-default">Leverage our expertise to build scalable and modern solutions.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full">
                            {services.map((svc, idx) => (
                                <div key={idx} className="group glass p-8 rounded-3xl hover:-translate-y-2 transition-all duration-300 hover:border-primary/50 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-bl-full -z-10 group-hover:scale-110 transition-transform duration-500"></div>
                                    <i className={`ph ${svc.icon} text-5xl text-primary mb-6 inline-block`}></i>
                                    <h3 className="text-xl font-bold mb-3 text-white">{svc.title}</h3>
                                    <p className="text-slate-400 group-hover:text-slate-300 transition-colors">{svc.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Works = () => {
            const [works, setWorks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchWorks = async () => {
                    try {
                        const response = await fetch('http://localhost:8000/api/works');
                        const data = await response.json();
                        setWorks(data.data || []);
                    } catch (error) {
                        console.error('Failed to fetch works', error);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchWorks();
            }, []);

            return (
                <section id="works" className="py-24 relative z-10 bg-slate-900/50">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">Featured <span className="text-primary">Works</span></h2>
                            <p className="text-slate-400 max-w-xl mx-auto">Explore some of our latest projects and innovations.</p>
                        </div>
                        
                        {loading ? (
                            <div className="flex justify-center items-center py-20">
                                <i className="ph ph-spinner animate-spin text-4xl text-primary"></i>
                            </div>
                        ) : works.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {works.map((work, idx) => (
                                    <div key={idx} className="group glass rounded-3xl overflow-hidden hover:-translate-y-2 transition-all duration-300 hover:shadow-[0_0_30px_rgba(99,102,241,0.2)] border border-white/5 hover:border-primary/30 flex flex-col">
                                        <div className="h-48 overflow-hidden relative">
                                            {work.image_url ? (
                                                <img src={work.image_url} alt={work.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                            ) : (
                                                <div className="w-full h-full bg-gradient-to-br from-indigo-900/50 to-purple-900/50 flex items-center justify-center">
                                                    <i className="ph-fill ph-image text-4xl text-white/20"></i>
                                                </div>
                                            )}
                                            <div className="absolute inset-0 bg-gradient-to-t from-cardDark via-transparent to-transparent opacity-80"></div>
                                        </div>
                                        <div className="p-8 flex-grow flex flex-col">
                                            <h3 className="text-2xl font-bold text-white mb-3">{work.title}</h3>
                                            <p className="text-slate-400 flex-grow">{work.description}</p>
                                            <div className="mt-6 pt-6 border-t border-white/10 flex justify-between items-center">
                                                <span className="text-sm text-primary font-medium">View Case Study</span>
                                                <i className="ph ph-arrow-right text-primary group-hover:translate-x-2 transition-transform"></i>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20 glass rounded-3xl">
                                <i className="ph-fill ph-folder-open text-5xl text-slate-500 mb-4 inline-block"></i>
                                <h3 className="text-xl text-white font-medium mb-2">No projects yet</h3>
                                <p className="text-slate-400">Our portfolio is currently being updated. Check back later!</p>
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        const Contact = () => {
            const [formData, setFormData] = useState({ name: '', email: '' });
            const [status, setStatus] = useState({ type: '', msg: '' });
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setStatus({ type: '', msg: '' });
                
                try {
                    const response = await fetch('http://localhost:8000/api/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        setStatus({ type: 'success', msg: data.message });
                        setFormData({ name: '', email: '' });
                    } else {
                        setStatus({ type: 'error', msg: data.detail || 'Something went wrong.' });
                    }
                } catch (error) {
                    setStatus({ type: 'error', msg: 'Failed to connect to backend server. Make sure Python backend is running.' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <section id="contact" className="py-24 relative">
                    <div className="max-w-3xl mx-auto px-6">
                        <div className="glass p-10 md:p-14 rounded-[2.5rem] relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>
                            <div className="text-center mb-10">
                                <h2 className="text-3xl md:text-4xl font-bold mb-4">Let's <span className="text-primary">Connect</span></h2>
                                <p className="text-slate-400">Fill out the form below and our team will get back to you.</p>
                            </div>
                            
                            {status.msg && (
                                <div className={`mb-6 p-4 rounded-xl flex items-center gap-3 ${status.type === 'success' ? 'bg-green-500/10 border border-green-500/20 text-green-400' : 'bg-red-500/10 border border-red-500/20 text-red-400'}`}>
                                    <i className={`ph-fill ${status.type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'} text-xl`}></i>
                                    {status.msg}
                                </div>
                            )}

                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">Full Name</label>
                                    <input 
                                        type="text" 
                                        required
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full bg-cardDark border border-white/10 rounded-xl px-4 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"
                                        placeholder="John Doe"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                                    <input 
                                        type="email" 
                                        required
                                        value={formData.email}
                                        onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        className="w-full bg-cardDark border border-white/10 rounded-xl px-4 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all"
                                        placeholder="john@example.com"
                                    />
                                </div>
                                <button type="submit" disabled={loading} className="w-full py-4 rounded-xl bg-primary text-white font-bold hover:bg-indigo-500 transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
                                    {loading ? (
                                        <><i className="ph ph-spinner animate-spin text-xl"></i> Sending...</>
                                    ) : (
                                        <><i className="ph-fill ph-paper-plane-right text-xl"></i> Send Message</>
                                    )}
                                </button>
                            </form>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="border-t border-white/10 py-10 text-center text-slate-500 relative z-10">
                <div className="flex justify-center items-center gap-2 mb-4">
                    <i className="ph-fill ph-planet text-primary text-xl"></i>
                    <span className="font-bold text-white">TechNova.</span>
                </div>
                <p>© {new Date().getFullYear()} TechNova Solutions. Built with Advanced aesthetic UI & Python.</p>
            </footer>
        );

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col relative w-full overflow-hidden">
                    {/* Background noise texture */}
                    <div className="absolute inset-0 opacity-[0.015] pointer-events-none mix-blend-overlay z-50 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
                    
                    <Navbar />
                    <main className="flex-grow">
                        <Hero />
                        <About />
                        <Services />
                        <Works />
                        <Contact />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
